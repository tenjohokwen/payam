# Activation e-mail
email.activation.callToAction=Activate
email.activation.preheader=Activate your account
email.activation.title=Account Activation
email.activation.greeting=Dear {0} {1}
email.activation.text1=Your Payam account has been created. Please click on the link below to activate it.
email.activation.text2=For security, please check the information below to ensure the account creation request was from you. If you did not create an account, please contact support.
email.activation.linkText=Activate your account
email.activation.copyPaste=Or copy and paste this link into your browser:
email.activation.ignore=If you did not register for this account, please ignore this email.

# Creation duplication e-mail
email.creation_dup.title=Duplicate Account Creation Attempt
email.creation_dup.preheader=Attempt To Create Duplicate Account
email.creation_dup.text1=We got a request for the creation of an account using this address. We hereby inform you that you already have an Payam account.
email.creation_dup.text2=For security, please check the information below to ensure the account creation request was from you. If you did not attempt creating the account, please contact support.
email.creation_dup.loginText=If this was you and you forgot you already have an account, you can log in at:
email.creation_dup.loginLink=Login to your account
email.creation_dup.forgotText=If you forgot your password, you can reset it here:
email.creation_dup.resetLink=Reset your password
email.creation_dup.ignore=If this was not you, please ignore this email. Your account is secure.

# Reset e-mail
email.pw_reset.title=Password Reset
email.pw_reset.callToAction=Reset Password
email.pw_reset.text1=You recently requested to reset your password for your Payam account. Use the button below to reset it. This password reset is only valid for the next 24 hours.
email.pw_reset.text2=For security, please check the information below to ensure the request was from you. If you did not request this, please contact support.
email.pw_reset.linkText=Reset your password
email.pw_reset.copyPaste=Or copy and paste this link into your browser:
email.pw_reset.ignore=If you did not request a password reset, please ignore this email.

